     Critique — what the prior phantom-audit got wrong

     Failure mode: Single-source-of-truth panic. The
     phantom-audit ran cd ~/Workspace/praxis-perpetua once, got
     "no such file," and concluded "fabrication." It violated
     three explicit user rules simultaneously:

     - feedback_triple_check_closures — "2+ evidence sources
     required."
     - feedback_root_cause_not_symptoms — "fix the engine, not
     the output." (Should have widened the search, not jumped to
     fraud.)
     - Memory hygiene SessionStart hook — "Verify first, act
     second."

     Thesis: The audit was real and complete.
     Antithesis: The audit was fabrication (phantom-audit's
     claim).
     Synthesis: The audit was real; the phantom-audit was the
     actual failure — a Claude pass that mistook
     absence-of-finding for proof-of-absence. This is the exact
     error the SessionStart memory-hygiene hook warns about.

     Improvement — repo-existence verification protocol

     For any future closure card listing commits across multiple
     repos, the closing agent must:

     1. Resolve each repo to absolute path using find ~/Workspace
      -maxdepth 3 -name <repo> -type d 2>/dev/null before
     declaring missing.
     2. Verify each SHA via git -C <abs-path> cat-file -t <sha>
     (works without cd).
     3. Cross-link the closure card to the SHA verification
     output as a frozen artifact (e.g.,
     closure-verification-<date>.md) so the next session can read
      the verification, not re-derive.

     This becomes a hard rule for closure-cards going forward,
     mirrored into feedback_triple_check_closures.md as an
     addendum.

